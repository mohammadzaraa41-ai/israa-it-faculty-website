    <meta name="description" content="البوابة الرسمية لكلية تكنولوجيا المعلومات بجامعة الإسراء - تميز أكاديمي، بيئة تعليمية ذكية، ومستقبل رقمي واعد." />
    <meta property="og:title" content="كلية تكنولوجيا المعلومات | جامعة الإسراء" />
    <meta property="og:description" content="تميز أكاديمي ومستقبل رقمي واعد في كلية تكنولوجيا المعلومات." />

    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root">
      <!-- High-Compatibility Splash Screen -->
      <div id="initial-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0f19; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
        <div style="width: 80px; height: 80px; margin-bottom: 24px; border: 4px solid rgba(52, 152, 219, 0.1); border-top: 4px solid #3498db; border-radius: 50%; animation: loader-spin 1s linear infinite;"></div>
        <p style="color: #3498db; font-size: 16px; font-weight: 500; letter-spacing: 2px;">ISRAA IT</p>
        <div id="error-display" style="display: none; margin-top: 20px; padding: 15px; background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; color: #e74c3c; border-radius: 8px; max-width: 80%; font-size: 12px; text-align: center;">
          <p style="margin-bottom: 5px; font-weight: bold;">System Alert</p>
          <span id="error-msg"></span>
        </div>
      </div>
      <style>
        @keyframes loader-spin { to { transform: rotate(360deg); } }
      </style>
      <script>
        // Service Worker registration handled in main.jsx
        // Global Error Tracker for Mobile Debugging
        window.onerror = function(msg, url, lineNo, columnNo, error) {
          var display = document.getElementById('error-display');
          var msgSpan = document.getElementById('error-msg');
          if (display && msgSpan) {
            display.style.display = 'block';
            msgSpan.innerText = msg + ' (Line: ' + lineNo + ')';
          }
          return false;
        };
        // Auto-remove loader when app mounts (safety fallback)
        window.addEventListener('load', function() {
          setTimeout(function() {
            var loader = document.getElementById('initial-loader');
            if (loader && window.appMounted) {
              loader.style.opacity = '0';
              setTimeout(function() { loader.style.display = 'none'; }, 500);
            }
          }, 5000);
        });
      </script>
    </div>
    <script type="module" src="/src/main.jsx?v=v6_CRITICAL_REFRESH"></script>
  </body>
</html>
